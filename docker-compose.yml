# docker-compose.yml — production VPS deployment.
#
# Usage on the VPS:
#   cp .env.production.example .env.production   # fill in real secrets
#   docker compose --env-file .env.production up -d --build
#
# Layout: Postgres + CMS + storefront + Caddy (reverse proxy, automatic
# HTTPS via Let's Encrypt) on one host — matches this project's existing
# local-dev shape (a Docker Postgres the CMS talks to) rather than
# introducing a new architecture just for production.
#
# BUILD ORDER MATTERS for a complete first deploy: the storefront's build
# step fetches the live product list from the CMS to prerender every PDP +
# build the sitemap (see apps/storefront/Dockerfile's header comment). On
# a brand new VPS, bring up postgres + cms first, seed it, THEN build the
# storefront — see deploy/README.md.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: yese
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs once against a fresh volume to create the second "umami"
      # database alongside the main one — see that file's header comment.
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  # Runs Payload's real migrations (apps/cms/src/migrations/) once against
  # a fresh/updated database, then exits. Found the hard way: Payload's
  # automatic dev-mode schema push (what every local `pnpm dev` session
  # has relied on across this whole project) does NOT run in production
  # (`next start`/standalone) — without this step, a truly fresh database
  # 500s on first request ("relation \"categories\" does not exist").
  # Uses the Dockerfile's `builder` stage specifically, not the lean
  # runtime image below — the runtime image's standalone output
  # deliberately excludes the Payload CLI/migration tooling, only the
  # builder stage still has it.
  migrate:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
      target: builder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/yese
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      # Confirmed the hard way: without this, Payload's runtime defaults
      # to dev-mode behavior for ANY command run through this service
      # (migrate AND seed) — including auto-push schema sync during
      # seeding, which then makes a LATER `payload migrate` call detect
      # "you've run in dev mode" and hang on an interactive y/N prompt
      # that can never be answered in a non-TTY container.
      NODE_ENV: production
    command: pnpm --filter @yese/cms migrate
    networks: [internal]

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URI: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/yese
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      # This is the CMS's own PUBLIC domain (see .env.production.example's
      # header comment for why this differs from the storefront's CMS_URL).
      CMS_URL: ${PUBLIC_CMS_URL}
      STOREFRONT_URL: ${STOREFRONT_URL}
      CMS_SERVICE_TOKEN: ${CMS_SERVICE_TOKEN}
      NODE_ENV: production
    volumes:
      # Uploaded product photos (local disk, per the media storage
      # decision) — a named volume so they survive `docker compose up
      # --build` redeploys. Back this up; it's the only copy.
      - cms_media:/app/apps/cms/media
    networks: [internal]

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        # Build-time only (prerender + sitemap generation) — see
        # apps/storefront/Dockerfile's header comment. Uses the internal
        # network so the build doesn't depend on the public domain/DNS
        # already resolving.
        CMS_URL: http://cms:3001
        SITE_URL: ${SITE_URL}
        # Vite bakes VITE_* vars into the client bundle at BUILD time —
        # these must be build args, not just the runtime `environment:`
        # below (confirmed the hard way: the tracking script silently
        # never rendered until this was fixed).
        VITE_ANALYTICS_URL: ${VITE_ANALYTICS_URL}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID}
    restart: unless-stopped
    depends_on:
      - cms
    environment:
      # Runtime CMS_URL: internal Docker network, not the public domain —
      # faster and doesn't round-trip through Caddy for server-to-server
      # calls. The image URLs the CMS RETURNS are already public (baked in
      # via the CMS's own PUBLIC_CMS_URL), so this doesn't affect what a
      # customer's browser actually loads.
      CMS_URL: http://cms:3001
      SITE_URL: ${SITE_URL}
      CMS_SERVICE_TOKEN: ${CMS_SERVICE_TOKEN}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NODE_ENV: production
    networks: [internal]

  # ---- Telemetry: product analytics (Umami) ----
  # Self-hosted, MIT-licensed, cookieless-by-default product analytics —
  # picked over something like self-hosted PostHog specifically because
  # PostHog's self-hosted stack needs ClickHouse + Kafka-equivalent + Redis
  # on top of Postgres, which is a mismatch for a single small VPS running
  # a one-woman shop. Umami is one container + one Postgres database (the
  # "umami" db created by deploy/postgres-init/ above).
  #
  # Cookieless matters here specifically: apps/cms/src/globals/LegalPages.ts's
  # Privacy Policy explicitly describes this as "privacy-friendly,
  # cookieless analytics" — keep that description accurate if this ever
  # gets swapped for a different tool.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/umami
      DATABASE_TYPE: postgresql
      # Generate with: openssl rand -base64 32
      APP_SECRET: ${UMAMI_APP_SECRET}
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - cms
      - storefront
      - umami
    networks: [internal]

  # ---- Telemetry (uptime/error monitoring, log aggregation) ----
  # Umami (above) covers PRODUCT analytics (user behavior). This section
  # is for the other kind — error tracking, uptime checks, log
  # aggregation — still not configured. Revisit separately.

networks:
  internal:

volumes:
  postgres_data:
  cms_media:
  caddy_data:
  caddy_config:
